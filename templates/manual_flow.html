{% extends "base.html" %}

{% block title %}Tracks manuell eingeben{% endblock %}

{% block content %}
<div class="card">
  <h1>Tracks manuell eingeben</h1>

  <form method="POST" action="{{ url_for('manual_process') }}" enctype="multipart/form-data">

    <div class="input-section">
      <label for="tracks_text">Trackliste eingeben <span class="hint">(ein Track pro Zeile, z.&nbsp;B. „Künstler – Titel")</span></label>
      <textarea id="tracks_text" name="tracks_text" rows="12"
                placeholder="Die Ärzte - Männer sind Schweine&#10;Depeche Mode - Personal Jesus&#10;..."></textarea>
    </div>

    <div class="divider"><span>oder</span></div>

    <div class="input-section">
      <label>TXT-Datei hochladen</label>
      <label class="file-drop-area" id="file-label">
        <span id="file-label-text">&#128194; Datei auswählen oder hierher ziehen</span>
        <input type="file" name="tracks_file" id="tracks_file" accept=".txt,text/plain" class="file-input-hidden">
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Weiter zur Bestätigung</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  const fileInput = document.getElementById('tracks_file');
  const fileLabel = document.getElementById('file-label');
  const fileLabelText = document.getElementById('file-label-text');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileLabelText.textContent = '✓ ' + fileInput.files[0].name;
      fileLabel.classList.add('file-selected');
    }
  });

  ['dragover', 'dragenter'].forEach(ev =>
    fileLabel.addEventListener(ev, e => { e.preventDefault(); fileLabel.classList.add('drag-over'); })
  );
  ['dragleave', 'drop'].forEach(ev =>
    fileLabel.addEventListener(ev, () => fileLabel.classList.remove('drag-over'))
  );
  fileLabel.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f) {
      const dt = new DataTransfer();
      dt.items.add(f);
      fileInput.files = dt.files;
      fileLabelText.textContent = '✓ ' + f.name;
      fileLabel.classList.add('file-selected');
    }
  });
</script>
{% endblock %}
