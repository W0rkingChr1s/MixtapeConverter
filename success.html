<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist erstellt! – Mixtape Converter</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="app-header">
  <a href="index.html"><img src="static/Mixtape-Converter_logo.png" alt="Mixtape Converter" class="header-logo"></a>
  <nav class="header-nav">
    <span class="provider-badge">Spotify</span>
  </nav>
</header>

<main class="main-content">
  <div class="card card-center" id="result-card">
    <!-- Filled by JS -->
  </div>
</main>

<footer class="app-footer"><a href="privacy.html">Datenschutzerklärung</a></footer>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/spotify.js"></script>
<script>
  requireAuth();

  const result = State.get('result') || {};
  const name   = State.get('playlist_name') || 'Meine Playlist';
  const card   = document.getElementById('result-card');

  const notFoundHtml = result.not_found?.length
    ? `<details class="not-found-details">
         <summary>Nicht gefunden (${result.not_found.length})</summary>
         <ul>${result.not_found.map(t => `<li>${t}</li>`).join('')}</ul>
       </details>`
    : '';

  const openBtn = result.playlist_url
    ? `<a href="${result.playlist_url}" target="_blank" rel="noopener" class="btn btn-primary">
         Playlist öffnen &#8599;
       </a>`
    : '';

  card.innerHTML = `
    <div class="success-icon">&#10003;</div>
    <h1>Playlist erstellt!</h1>
    <p class="subtitle"><strong>„${name}"</strong> wurde erfolgreich bei Spotify angelegt.</p>

    <div class="result-stats">
      <div class="stat">
        <span class="stat-num">${result.tracks_added ?? 0}</span>
        <span class="stat-label">Tracks hinzugefügt</span>
      </div>
      ${result.not_found?.length ? `
      <div class="stat stat-warn">
        <span class="stat-num">${result.not_found.length}</span>
        <span class="stat-label">nicht gefunden</span>
      </div>` : ''}
    </div>

    ${notFoundHtml}
    ${openBtn}

    <div class="success-actions">
      <a href="flow.html" class="btn btn-secondary">Neue Playlist erstellen</a>
      <a href="index.html" class="btn btn-secondary">Zurück zum Start</a>
    </div>`;
</script>
</body>
</html>
